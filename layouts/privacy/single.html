{{ define "main" }}

<section class="lp-policy-header">
  <div class="lp-policy-header-inner">
    <img src="/images/logo.png" alt="Drivest" class="lp-policy-logo">
    <h1>{{ .Title }}</h1>
    {{ with .Date }}<p class="lp-policy-meta">Last updated: {{ .Format "January 2, 2006" }}</p>{{ end }}
  </div>
</section>

<section class="lp-policy-body">
  <div class="lp-policy-content">
    <a href="/" class="lp-policy-back">&#8592; Back to Drivest</a>
    {{ .Content }}
  </div>
</section>

{{ end }}
