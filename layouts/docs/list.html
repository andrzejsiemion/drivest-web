{{ define "main" }}

<section class="lp-policy-header">
  <div class="lp-policy-header-inner">
    <img src="/images/logo.png" alt="Drivest" class="lp-policy-logo">
    <h1>Documentation</h1>
    <p class="lp-policy-meta">Learn how to use Drivest to track your vehicle costs</p>
  </div>
</section>

<section class="lp-policy-body">
  <div class="lp-docs-layout">
    <nav class="lp-docs-nav">
      <ul>
        {{ range .Pages.ByWeight }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
        {{ end }}
      </ul>
    </nav>
    <div class="lp-policy-content lp-docs-content">
      <a href="/" class="lp-policy-back">&#8592; Back to Drivest</a>
      {{ .Content }}
    </div>
  </div>
</section>

{{ end }}
